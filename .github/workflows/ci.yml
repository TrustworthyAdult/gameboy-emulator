name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt, clippy, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  conformance:
    name: SingleStepTests/sm83
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Cache SingleStepTests corpus
        id: sm83-cache
        uses: actions/cache@v4
        with:
          path: sm83-data
          key: sm83-v1

      - name: Download SingleStepTests corpus
        if: steps.sm83-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/SingleStepTests/sm83 sm83-data

      - name: Run conformance suite
        env:
          SM83_TEST_DIR: ${{ github.workspace }}/sm83-data/v1
        run: cargo test --features sm83-conformance --test sm83_conformance -- --nocapture
